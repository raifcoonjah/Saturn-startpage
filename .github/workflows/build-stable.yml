name: Build & publish to github releases

on:
  push:
    branches: [work/raifcoonjah/automation/build-extention]

  pull_request:
    branches: [work/raifcoonjah/automation/build-extention]

# Jobs
jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup npm
        uses: actions/setup-node@v3
        with:
          node-version: 14
      - name: Install web-ext using npm
        run: npm -g install web-ext
      - name: Lint Extention
        run: web-ext lint
